      { t: "\u2464 \uD0C0\uACE0\uB09C \uC7AC\uC8FC\uC640 \uC81C\uC790\uB9AC", s: a.scores[5], free: true, b: `${expr ? `\uB108\uB294 '\uB9CC\uB4E4\uC5B4 \uB0B4\uB193\uC744 \uB54C' \uBE5B\uB098\uB294 \uC544\uC774\uC57C. \uBA38\uB9BF\uC18D \uC0DD\uAC01\uC744 \uAE00\xB7\uB9D0\xB7\uC791\uD488\xB7\uC131\uACFC\uB85C \uAEBC\uB0B4\uB294 \uAE38\uC774 \uC0B4\uC544 \uC788\uC5B4\uC11C, \uC313\uC544\uB450\uAE30\uB9CC \uD558\uBA74 \uB418\uB808 \uB2F5\uB2F5\uD574\uC9C0\uC9C0. \uC190\uC5D0\uC11C \uBB54\uAC00 \uB098\uC640\uC57C \uC0AC\uB294 \uC0AC\uB78C\uC774\uB780\uB2E4.` : `\uB108\uB294 '\uC881\uACE0 \uAE4A\uAC8C' \uAC08 \uB54C \uBE5B\uB098\uB294 \uC544\uC774\uC57C. \uC774\uAC83\uC800\uAC83 \uB113\uAC8C \uBC8C\uC774\uAE30\uBCF4\uB2E4, \uD55C \uC6B0\uBB3C\uC744 \uB05D\uAE4C\uC9C0 \uD30C '\uC774\uAC74 \uC774 \uC0AC\uB78C'\uC774\uB77C\uB294 \uAD8C\uC704\uB97C \uC138\uC6B8 \uB54C \uC9C4\uC9DC \uD798\uC774 \uB098\uC9C0.`} ${wealthBig ? `\uAC8C\uB2E4\uAC00 '\uD604\uC2E4\uC744 \uC950\uB294 \uD798'\uAE4C\uC9C0 \uC138\uC11C, \uC7AC\uC8FC\uB97C \uBA38\uB9BF\uC18D \uCDE8\uBBF8\uB85C \uB05D\uB0B4\uC9C0 \uC54A\uACE0 \uC2E4\uC81C \uB3C8\uACFC \uACB0\uC2E4\uB85C \uC787\uB294 \uC904\uC774 \uB610\uB837\uD574. \uC774\uAC8C \uC758\uC678\uB85C \uB4DC\uBB38 \uBCF5\uC774\uB780\uB2E4 \u2014 \uC7AC\uC8FC\uAFBC\uC740 \uB9CE\uC544\uB3C4 \uADF8\uAC78 \uB3C8\uC73C\uB85C \uBC14\uAFB8\uB294 \uC774\uB294 \uC801\uAC70\uB4E0.` : ``} \uC77C\uB85C \uCE58\uBA74 ${job}\uC774 \uC798 \uB9DE\uC544. \uB418\uB808 \uB2E8\uC21C \uBC18\uBCF5, \uB2F5 \uC815\uD574\uC9C4 \uC77C\uC740 \uAE08\uC138 \uC2DC\uB4E4 \uAC8C\uB2E4. \uB124 \uC5D4\uC9C4\uC740 '\uB73B'\uACFC '\uC81C \uBE5B\uAE54'\uC744 \uC5F0\uB8CC\uB85C \uB3C4\uB2C8\uAE4C.` },
      { t: "\u2465 \uBA38\uB9AC \uAD74\uB9AC\uB294 \uACB0", s: a.scores[2], free: false, b: `${resourceBig ? `${V}\uB108\uB294 \uD55C\uBC88 \uD30C\uACE0\uB4E4\uBA74 \uD1B5\uC9F8\uB85C '\uAD6C\uC870'\uB85C \uC0BC\uD0A4\uB294 \uC544\uC774\uC57C. \uD1A0\uB9C9 \uC9C0\uC2DD\uC774 \uC544\uB2C8\uB77C '\uC65C \uADF8\uB9AC \uB418\uB294\uAC00'\uB97C \uC54C\uC544\uC57C \uC9C1\uC131\uC774 \uD480\uB9AC\uC9C0. \uADF8\uB7EC\uB2C8 \uC81C\uB300\uB85C \uC775\uD78C \uAC74 \uD3C9\uC0DD \uAC00. \uB2E4\uB9CC \uD568\uC815\uC774 \uD558\uB098 \uC788\uC5B4 \u2014 '\uC8C4\uB2E4 \uC54C\uACE0\uC11C\uC57C \uC6C0\uC9C1\uC774\uB824\uB294' \uBC84\uB987. \uADF8 \uD0D3\uC5D0 \uC2DC\uC791\uC774 \uC790\uAFB8 \uB2A6\uB294\uB2E8\uB2E4. \uD55C\uB9C8\uB514 \uD558\uB9C8: \uC77C\uACF1 \uD47C\uB9CC \uC54C\uC558\uC73C\uBA74 \uC6B0\uC120 \uC2DC\uC791\uD558\uAC70\uB77C. \uB098\uBA38\uC9C0 \uC14B\uC740 \uCC45\uC0C1\uC774 \uC544\uB2C8\uB77C '\uD558\uB2E4 \uBCF4\uBA74' \uCC44\uC6CC\uC9C4\uB2E8\uB2E4.` : `${V}\uB108\uB294 \uBAB8\uC73C\uB85C \uBD80\uB52A\uCCD0 \uC775\uD788\uB294 \uC544\uC774\uC57C. \uCC45\uC0C1\uBB3C\uB9BC\uBCF4\uB2E4 \uD604\uC7A5\uC5D0\uC11C \uAD74\uB7EC\uBCFC \uB54C \uD6E8\uC52C \uBE68\uB9AC \uC790\uB77C\uC9C0. \uC644\uBCBD\uD55C \uCC44\uBE44\uB97C \uAE30\uB2E4\uB9AC\uC9C0 \uB9D0\uACE0, \uC791\uAC8C \uC800\uC9C8\uB7EC \uBCF4\uACE0 \uACE0\uCCD0 \uB098\uAC00\uB294 \uAC8C \uB124\uAC90 \uC815\uB2F5\uC774\uB780\uB2E4.`}` },
      { t: "\u2466 \uBB34\uC2A8 \uC77C\uC744 \uD574\uC57C \uD480\uB9AC\uB290\uB0D0", s: null, free: false, b: `${V}\uB108\uB294 \uACA9\uC73C\uB85C '${geok}'\uC774\uC57C. \uC27D\uAC8C \uB9D0\uD574 ${gi.\uB098}\uB780 \uB73B\uC774\uC9C0. \uC774\uB7F0 \uC544\uC774\uB294 ${gi.\uC77C}\uC5D0\uC11C \uBB3C \uB9CC\uB09C \uB4EF \uD480\uB9B0\uB2E8\uB2E4. ${officerWeak ? `\uD2B9\uD788 \uB108\uB294 '\uB0A8\uC774 \uC9DC\uB193\uC740 \uD2C0\uC5D0\uC11C \uC2DC\uD0A4\uB294 \uB300\uB85C' \uC77C\uD560 \uB54C \uAC00\uC7A5 \uC2DC\uB4E4\uC5B4. \uB418\uB808 '\uB0B4 \uC774\uB984\uC744 \uAC78\uACE0' \uD558\uB294 \uC21C\uAC04 \uC0AC\uB78C\uC774 \uB2EC\uB77C\uC9C0\uC9C0. \uC9C0\uAE08 \uC870\uC9C1\uC5D0 \uC788\uAC70\uB4E0, \uADF8 \uC548\uC5D0\uC11C\uB77C\uB3C4 '\uB0B4 \uC790\uB9AC'\uB97C \uAF2D \uB9CC\uB4E4\uC5B4 \uB450\uAC70\uB77C.` : `\uC790\uB9AC\uC640 \uCC45\uC784\uC774 \uC8FC\uC5B4\uC9C8\uC218\uB85D \uBE5B\uB098\uB294 \uC544\uC774\uB77C, \uB9E1\uACA8\uB450\uBA74 \uB05D\uAE4C\uC9C0 \uD574\uB0B4\uBA70 \uBBFF\uC74C\uC744 \uC313\uC544 \uC62C\uB77C\uAC04\uB2E8\uB2E4.`} \uD55C \uAC00\uC9C0 \uC870\uC2EC\uD560 \uAC74 \u2014 ${gi.\uC8FC\uC758}\uC774\uC57C. \uB9C8\uCE68 \uC9C0\uAE08\uC740 '${GROUP_PLAIN[cur.group].n}'\uC758 \uCCA0\uC744 \uC9C0\uB098\uB2C8, ${cur.fav ? "\uC77C\uD130\uAC00 \uD55C \uBF18 \uB113\uC5B4\uC9C0\uAE30 \uC88B\uC740 \uB54C\uB2E4. \uAE30\uD68C\uAC00 \uC624\uAC70\uB4E0 \uB9DD\uC124\uC774\uC9C0 \uB9D0\uAC70\uB77C." : "\uC18D\uC744 \uB2E8\uB2E8\uD788 \uB2E4\uC9C0\uAE30 \uC88B\uC740 \uB54C\uC57C. \uC9C0\uAE08 \uC313\uB294 \uAC8C \uB2E4\uC74C \uB3C4\uC57D\uC758 \uBC1C\uD310\uC774 \uB41C\uB2E8\uB2E4."}` },
      { t: "\u2467 \uD0C0\uACE0\uB09C \uB3C8 \uADF8\uB987", s: a.scores[6], free: false, b: `${wealthBig ? `${V}\uB3C8 \uC598\uAE30\uBD80\uD130 \uD574\uC8FC\uB9C8 \u2014 \uB108\uB294 \uB3C8\uACFC \uAE30\uD68C\uB97C \uB04C\uC5B4\uB2F9\uAE30\uB294 '\uADF8\uB987'\uC744 \uD06C\uAC8C \uD0C0\uACE0\uB0AC\uC5B4. \uD3C9\uC0DD \uB3C8\uC774 \uACC1\uC744 \uC544\uC8FC \uB5A0\uB098\uC9C4 \uC54A\uB294 \uCABD\uC774\uB780\uB2E4.` : `${V}\uB108\uB294 \uD55C \uBC29\uC5D0 \uD06C\uAC8C \uBC84\uB294 \uD615\uC774\uB77C\uAE30\uBCF4\uB2E8, \uCC28\uACE1\uCC28\uACE1 \uC313\uC544 \uB05D\uB0B4 \uB2E8\uB2E8\uD574\uC9C0\uB294 \uD615\uC774\uC57C. \uD654\uB824\uD558\uC9C4 \uC54A\uC544\uB3C4 \uBB34\uB108\uC9C0\uC9C0 \uC54A\uB294 \uC0B4\uB9BC\uC774\uC9C0.`}${expr && wealthBig ? ` \uB354\uAD6C\uB098 \uC7AC\uC8FC\uAC00 \uACB0\uC2E4\uB85C, \uACB0\uC2E4\uC774 \uB3C8\uC73C\uB85C \uC774\uC5B4\uC9C0\uB294 \uC904\uC774 \uC790\uC5F0\uC2A4\uB7EC\uC6CC '\uB2A5\uB825\uC73C\uB85C \uBC84\uB294 \uBD80\uC790' \uC904\uC774\uB780\uB2E4.` : ``} ${sj === "\uC2E0\uC57D" ? `\uB2E4\uB9CC \uC194\uC9C1\uD788 \uC9DA\uC73C\uB9C8 \u2014 \uADF8\uB987\uC740 \uD070\uB370 \uADF8\uAC78 '\uC6C0\uCF1C\uC950\uB294 \uC190\uC544\uADC0 \uD798'\uC774 \uC5EC\uBB34\uB294 \uB54C\uAC00 \uC880 \uB2A6\uC5B4. \uADF8\uB798\uC11C \uC80A\uC5B4\uC120 '\uC7AC\uC8FC\uC5D0 \uBE44\uD574 \uC5B4\uCC0C \uBABB \uBC84\uB098' \uC2F6\uC744 \uAC8C\uB2E4. \uD5C8\uB098 \uC870\uAE09\uD574 \uB9D0\uAC70\uB77C. \uB108\uB97C \uBC1B\uCCD0\uC8FC\uB294 \uAE30\uC6B4\uC774 \uB4DC\uB294 \uB54C\uBD80\uD130 \uADF8\uB987\uC774 \uBCF8\uACA9\uC73C\uB85C \uCC28\uAE30 \uC2DC\uC791\uD55C\uB2E8\uB2E4.` : `\uAC15\uD55C \uD798\uC73C\uB85C \uC190\uC218 \uC77C\uAD88 \uBAA8\uC73C\uB294 \uC790\uC218\uC131\uAC00\uD615\uC774\uB77C, \uB0A8\uC5D0\uAC8C \uAE30\uB300\uAE30\uBCF4\uB2E4 \uB124 \uC190\uC73C\uB85C \uB9CC\uB4E4 \uB54C \uAC00\uC7A5 \uD06C\uAC8C \uBAA8\uC778\uB2E8\uB2E4.`}` },
      { t: "\u2468 \uD3C9\uC0DD \uB3C8\uC758 \uBB3C\uAE38", s: null, free: false, b: `${V}\uC0B4\uB2E4 \uBCF4\uBA74 \uC5F4 \uD574\uB9C8\uB2E4 \uBC14\uB00C\uB294 \uD070 \uBB3C\uAE38\uC774 \uC788\uC5B4. \uC774\uB97C '\uB300\uC6B4'\uC774\uB77C \uD55C\uB2E8\uB2E4. \uB124 \uB300\uC6B4\uC744 \uCB49 \uD3B4 \uBCF4\uB2C8, ${favAges.slice(0, 3).map((x) => x + "\uC138").join("\xB7")} \uC5B4\uB984\uC5D0 \uB108\uB97C \uB3D5\uB294 \uAE30\uC6B4\uC774 \uCC28\uB840\uB85C \uB4E4\uBA74\uC11C, \uADF8\uAC04\uC758 \uC560\uC500\uC774 '\uC2E4\uC81C \uB3C8'\uC73C\uB85C \uC190\uC5D0 \uC549\uAE30 \uC2DC\uC791\uD558\uB294\uAD6C\uB098. ${sj === "\uC2E0\uC57D" ? "\uC804\uD615\uC801\uC778 '\uB300\uAE30\uB9CC\uC131'\uC774\uC57C. \uD130 \uB2E6\uACE0 \u2192 \uB2E4\uC9C0\uACE0 \u2192 \uD53C\uC6B0\uACE0, \uC774 \uC21C\uC11C\uB85C \uB354\uB514\uB098 \uD55C \uBC88 \uC624\uB97C \uB550 \uD06C\uAC8C \uC624\uB974\uB294 \uACE1\uC120\uC774\uC9C0. \uC2A4\uBB34 \uC0B4\u223C\uC11C\uB978 \uCD08\uAC00 \uB354\uB3A0\uB2E4\uBA74 \uADF8\uAC74 \uACE1\uC120\uC758 '\uCC44\uBE44 \uAD6C\uAC04'\uC774\uC5C8\uC744 \uBFD0\uC774\uB780\uB2E4." : "\uBE44\uAD50\uC801 \uC774\uB978 \uB54C\uBD80\uD130 \uC131\uACFC\uAC00 \uAFB8\uC900\uD788 \uC313\uC774\uB294 \uC624\uB984\uC138\uC57C. \uD55C\uBC88 \uBB3C\uAE38\uC744 \uD0C0\uBA74 \uAE38\uAC8C \uC774\uC5B4\uC9C4\uB2E8\uB2E4."} \uC544\uB798 \uACE1\uC120\uC5D0\uC11C \uB124 \uD750\uB984\uC744 \uB208\uC73C\uB85C \uBCF4\uAC70\uB77C.` },
      { t: "\u2469 \uB3C8\uC744 \uC9C0\uD0A4\uACE0 \uBD88\uB9AC\uB294 \uBC95", s: null, free: false, b: `${sj === "\uC2E0\uC57D" ? `${V}\uC9C4\uC2EC\uC73C\uB85C \uB2F9\uBD80\uD558\uB9C8. '\uD55C \uACF3\uC5D0 \uBAB0\uBE75'\uC740 \uB3C5\uC774\uC57C. \uB124 \uC0AC\uC8FC\uB294 \uC695\uC2EC\uC774 \uACFC\uC5F4\uB85C \uBC88\uC9C8 \uB54C \uD06C\uAC8C \uB370\uB294 \uC9DC\uC784\uC774\uB77C, \uC5EC\uB7EC \uAD70\uB370 \uB098\uB220 \uADDC\uCE59\uB300\uB85C \uAD74\uB9AC\uB294 \uAC8C \uD6E8\uC52C \uB9DE\uC544. \uB610 \uD63C\uC790 \uB2E4 \uD310\uB2E8 \uB9D0\uACE0, \uBBFF\uC744 \uB9CC\uD55C \uC774\uC640 \uD568\uAED8 \uC815\uD558\uAC70\uB77C. \uB05D\uC73C\uB85C \uAC00\uC7A5 \uC911\uD55C \uAC83 \u2014 \uB124 \uD3C9\uC0DD \uC73C\uB738 \uD22C\uC790\uCC98\uB294 \uC8FC\uC2DD\uB3C4 \uB545\uB3C4 \uC544\uB2C8\uB77C '\uB124 \uC2E4\uB825'\uC774\uB780\uB2E4. \uB124 \uC7AC\uC8FC\uC5D0 \uB4E4\uC774\uB294 \uB3C8\uACFC \uC2DC\uAC04\uC774 \uB124\uAC90 \uCD5C\uACE0 \uBCF5\uB9AC\uC57C.` : `${V}\uB108\uB294 \uACFC\uAC10\uD788 \uAC78\uC5B4\uBCFC \uBC43\uC2EC\uC774 \uC788\uB294 \uC0AC\uC8FC\uC57C. \uAE30\uD68C \uC55E\uC5D0 \uC6C0\uCE20\uB9B4 \uAC83 \uC5C6\uB2E4. \uB2E4\uB9CC \uADF8 \uC13C \uCD94\uC9C4\uB825\uC774 '\uACFC\uC5F4'\uB85C \uBC88\uC9C0\uC9C0 \uC54A\uAC8C, '\uC5EC\uAE30\uAE4C\uC9C0 \uBE60\uC9C0\uBA74 \uBBF8\uB828 \uC5C6\uC774 \uD310\uB2E4'\uB294 \uAE08\uC744 \uBBF8\uB9AC \uADF8\uC5B4 \uB450\uAC70\uB77C. \uB124\uAC90 \uADDC\uCE59\uC774 \uACE7 \uBC29\uD328\uB780\uB2E4.`}` },

      { t: "\u246F \uC778\uC0DD\uC758 \uD070 \uBB3C\uC904\uAE30", s: a.scores[6], free: false, b: `${V}\uB108\uB294 ${a.startAge}\uC138 \uC5B4\uB984\uBD80\uD130 \uC778\uC0DD\uC758 \uD070 \uBB3C\uC904\uAE30(\uB300\uC6B4)\uAC00 \uC5F4 \uD574\uB9C8\uB2E4 \uBC14\uB00C\uBA70 \uD750\uB978\uB2E8\uB2E4. \uC9C0\uAE08 \uB108\uB294 '${GROUP_PLAIN[cur.group].n}'\uC758 \uAC15\uC744 \uC9C0\uB098\uB294 \uC911\uC774\uC57C. ${cur.fav ? "\uC774 \uCCA0\uC740 \uBB34\uB300\uAC00 \uB113\uC5B4\uC9C0\uACE0 \uAE30\uD68C\uAC00 \uB4DC\uB294 '\uC624\uB984 \uAD6C\uAC04'\uC774\uC57C. \uAC00\uB9CC\uC788\uAE30 \uC544\uAE4C\uC6B4 \uB54C\uB780 \uB9D0\uC774\uC9C0." : "\uC774 \uCCA0\uC740 \uD654\uB824\uD55C \uACB0\uC2E4\uBCF4\uB2E4 \uBFCC\uB9AC\uB97C \uAE4A\uC774 \uB0B4\uB9AC\uB294 '\uB2E4\uC9C0\uB294 \uAD6C\uAC04'\uC774\uC57C. \uC9C0\uAE08 \uB2E4\uC9C4 \uC18D\uC774 \uB2E4\uC74C \uC624\uB984\uC138\uC758 \uC5F0\uB8CC\uAC00 \uB41C\uB2E8\uB2E4."} ${nextFav && nextFav.age > cur.age ? `\uADF8\uB9AC\uACE0 \uB2E4\uC74C\uC73C\uB85C \uB108\uB97C \uD06C\uAC8C \uBC00\uC5B4\uC904 \uD750\uB984\uC740 ${nextFav.age}\uC138 \uC5B4\uB984\uC5D0 \uB4E0\uB2E8\uB2E4. \uC778\uC0DD \uB450 \uBC88\uC9F8 \uB9C8\uB2F9\uC774 \uAC70\uAE30\uC11C \uC5F4\uB9AC\uC9C0.` : favAges.length ? `\uC55E\uC73C\uB85C\uB294 ${favAges.filter((x) => x >= cur.age).slice(0, 2).map((x) => x + "\uC138").join("\xB7")} \uAD6C\uAC04\uC774 \uD2B9\uD788 \uC88B\uB2E8\uB2E4.` : ""}` },

      { t: "\u2471 \uBB34\uC5BC \uD574\uB3C4 \uD480\uB9AC\uB294 \uB54C", s: null, free: false, b: `${V}\uB204\uAD6C\uC5D0\uAC8C\uB098 '\uBB34\uC5BC \uD574\uB3C4 \uC774\uC0C1\uD788 \uD480\uB9AC\uB294' \uCCA0\uC774 \uC788\uB2E8\uB2E4. \uB124\uAC90 \uADF8 \uD669\uAE08\uAE30\uAC00 \u2014 \uAC00\uAE4C\uC774\uB294 ${nextFav ? `${nextFav.age}\uC138 \uC548\uD30E` : "\uC55E\uC73C\uB85C \uC138 \uD574 \uC548"}, \uBA40\uB9AC\uB294 ${favAges.slice(0, 2).map((x) => x + "\uC138").join("\xB7")} \uC5B4\uB984\uC774\uC57C. \uC774\uB54C \uB124\uAC8C \uAC00\uC7A5 \uC88B\uC740 \uAE30\uC6B4\uC778 '${yongKr}'\uC774 \uC0AC\uC8FC\uC5D0 \uAC00\uB4DD \uCC28\uBA74\uC11C, \uBB35\uBB35\uD788 \uC313\uC544\uC628 \uAC83\uB4E4\uC774 \uD55C\uAEBC\uBC88\uC5D0 \uACB0\uC2E4\uB85C \uB3CC\uC544\uC628\uB2E8\uB2E4. \uADF8\uB7EC\uB2C8 \uC774\uC0AC\xB7\uCC3D\uC5C5\xB7\uD070 \uACC4\uC57D\xB7\uC911\uD55C \uB3C4\uC804\uCC98\uB7FC \uC778\uC0DD\uC744 \uBC14\uAFC0 \uC77C\uC740 \uB418\uB3C4\uB85D \uC774 \uAD6C\uAC04\uC5D0 \uAC78\uAC70\uB77C. \uAC19\uC740 \uC560\uB97C \uC368\uB3C4 \uACB0\uACFC\uAC00 \uB2E4\uB974\uAC8C \uB098\uC628\uB2E8\uB2E4.` },
      { t: "\u2472 \uC870\uC2EC\uD560 \uB54C\uC640 \uC0AC\uB78C", s: null, free: false, b: `${V}\uC774\uBC88\uC5D4 \uC194\uC9C1\uD788 \uC77C\uB7EC\uC904 \uACBD\uACC4\uC9C0. ${clashes.length ? `\uB124 \uC0AC\uC8FC\uC5D4 '${clashes[0].ab}'\uC758 \uCDA9(\u6C96) \u2014 \uB450 \uAE30\uC6B4\uC774 \uC815\uBA74\uC73C\uB85C \uBD80\uB52A\uCE58\uB294 \uC790\uB9AC\uAC00 \uC788\uC5B4. ${clashes[0].a}\xB7${clashes[0].b} \uC790\uB9AC\uC758 \uCDA9\uB3CC\uC774\uB77C, ${clashes[0].a === "\uB144" || clashes[0].b === "\uB144" ? "\uC774\uB978 \uC2DC\uC808\uC774\uB098 \uC9D1\uC548\uC77C\uC5D0\uC11C \uD55C \uBC88 \uD070 \uBCC0\uB3D9" : clashes[0].a === "\uC77C" || clashes[0].b === "\uC77C" ? "\uBC30\uC6B0\uC790\xB7\uB3D9\uBB34 \uC0AC\uC774\uC758 \uBC00\uACE0 \uB2F9\uAE30\uB294 \uAE34\uC7A5" : "\uC911\uB144 \uB4A4\uC758 \uAC70\uCC98\xB7\uC0DD\uC5C5 \uBCC0\uB3D9"}\uC73C\uB85C \uB4DC\uB7EC\uB098\uAE30 \uC27D\uB2E8\uB2E4. \uB098\uC058\uAC8C\uB9CC \uBCFC \uAC74 \uC544\uB2C8\uC57C \u2014 \uCDA9\uC740 '\uBCC0\uD654\uC758 \uC5D4\uC9C4'\uC774\uB77C, \uC798 \uC4F0\uBA74 \uACE0\uC778 \uD310\uC744 \uAC08\uC544\uC5CE\uB294 \uD798\uC774 \uB418\uAC70\uB4E0. \uB2E4\uB9CC \uC6B1\uD574\uC11C \uD55C \uBC88\uC5D0 \uB4A4\uC5CE\uC9C4 \uB9D0\uAC70\uB77C.` : `\uB124 \uC0AC\uC8FC\uB294 \uD070 \uCDA9\uB3CC \uC5C6\uC774 \uBE44\uAD50\uC801 \uC548\uC628\uD558\uAC8C \uC9DC\uC600\uAD6C\uB098. \uB300\uC2E0 \uBCC0\uD654\uAC00 \uC801\uC740 \uB9CC\uD07C, \uC2A4\uC2A4\uB85C \uD754\uB4E4\uC5B4 \uAE68\uC6B0\uC9C0 \uC54A\uC73C\uBA74 \uD55C\uC790\uB9AC\uC5D0 \uC624\uB798 \uBA38\uBB3C \uC218 \uC788\uB2E8\uB2E4.`} \uADF8\uB9AC\uACE0 \uB124\uAC00 \uAC00\uC7A5 \uC870\uC2EC\uD560 \uC0AC\uB78C\uC740 '${sj === "\uC2E0\uC57D" ? "\uB2F9\uC7A5 \uD06C\uAC8C \uD55C \uBC29 \uBC8C\uC774\uC790 \uBD80\uCD94\uAE30\uB294" : "\uB124 \uC0DD\uAC01\uC774 \uBB34\uC870\uAC74 \uC633\uB2E4 \uB354 \uBD80\uCD94\uAE30\uB294"}' \uBD80\uB958\uC57C. \uB3D9\uC5C5\xB7\uBCF4\uC99D\xB7\uBE5A\uBCF4\uC99D\uB9CC\uC740 \uB450 \uBC88 \uC138 \uBC88 \uB530\uC838 \uBCF4\
